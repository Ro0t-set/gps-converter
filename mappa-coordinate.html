// UTM conversion for popup
function toUTM33(lat, lon) {
  const a=6378137,f=1/298.257223563,n=f/(2-f),A_=a/(1+n)*(1+n*n/4+n*n*n*n/64);
  const alpha=[0,n/2-2*n*n/3+5*n*n*n/16,13*n*n/48-3*n*n*n/5,61*n*n*n/240];
  const k0=0.9996,zone=33,lon0=((zone-1)*6-180+3)*Math.PI/180;
  const latR=lat*Math.PI/180,lonR=lon*Math.PI/180;
  const tau=Math.tan(latR),e=Math.sqrt(2*f-f*f),sinLat=Math.sin(latR);
  const sigma=Math.sinh(e*Math.atanh(e*sinLat));
  const tauP=tau*Math.sqrt(1+sigma*sigma)-sigma*Math.sqrt(1+tau*tau);
  const xi0=Math.atan2(tauP,Math.cos(lonR-lon0));
  const eta0=Math.asinh(Math.sin(lonR-lon0)/Math.sqrt(tauP*tauP+Math.cos(lonR-lon0)**2));
  let xi=xi0,eta=eta0;
  for(let j=1;j<=3;j++){xi+=alpha[j]*Math.sin(2*j*xi0)*Math.cosh(2*j*eta0);eta+=alpha[j]*Math.cos(2*j*xi0)*Math.sinh(2*j*eta0);}
  return{e:Math.round(eta*k0*A_+500000),n:Math.round(xi*k0*A_)};
}

  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17})
};
let activeLayer = layers.street.addTo(map);

function setLayer(type) {
  map.removeLayer(activeLayer);
  activeLayer = layers[type].addTo(map);
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

  const color = isUtm ? '#34D399' : '#4A7CFF';
  const utm = toUTM33(p.lat, p.lon);
  
  const icon = L.divIcon({
    className:'',
    html:`<div style="

    iconSize:[isUtm?16:14,isUtm?16:14],

  });
  
  const badge = isUtm 
    ? '<span class="popup-badge badge-utm">GIÀ UTM 33N</span>'
    : '<span class="popup-badge badge-conv">CONVERTITO</span>';
  
  const popup = `
    <div class="popup-name">${p.name}</div>
    <div class="popup-prot">Prot. ${p.prot}</div>
    <div class="popup-coords">

      UTM 33N: <span>E ${utm.e} &nbsp;N ${utm.n}</span>
    </div>
    ${badge}
  `;
  
  const m = L.marker([p.lat, p.lon], {icon}).bindPopup(popup);
  m.addTo(map);
  group.addLayer(m);
  markers.push(m);
});

map.fitBounds(group.getBounds().pad(0.08));

function fitAll() { map.fitBounds(group.getBounds().pad(0.08)); }
